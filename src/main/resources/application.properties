# AUTHENTICATION
quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=authenticated

# propagate the apm-principal-token from requests we receive
org.eclipse.microprofile.rest.client.propagateHeaders=apm-principal-token

# PROD
%prod.quarkus.rest-client.onecx_notification_svc.url=http://onecx-notification-svc:8080

# DEV
# BUILD
quarkus.openapi-generator.codegen.input-base-dir=target/tmp/openapi
quarkus.openapi-generator.codegen.spec.onecx_notification_internal_svc_yaml.config-key=onecx_notification_svc
quarkus.openapi-generator.codegen.spec.onecx_notification_internal_svc_yaml.base-package=gen.org.tkit.onecx.notification.svc.internal.client
quarkus.openapi-generator.codegen.spec.onecx_notification_internal_svc_yaml.return-response=true
quarkus.openapi-generator.codegen.spec.onecx_notification_internal_svc_yaml.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders;
quarkus.openapi-generator.codegen.spec.onecx_notification_internal_svc_yaml.additional-model-type-annotations=@io.quarkus.runtime.annotations.RegisterForReflection;
quarkus.openapi-generator.codegen.spec.onecx_notification_internal_svc_yaml.enable-security-generation=false
# OIDC
%prod.quarkus.oidc-client.client-id=${quarkus.application.name}
%prod.quarkus.rest-client.onecx_notification_svc.providers=io.quarkus.oidc.client.reactive.filter.OidcClientRequestReactiveFilter

# INTEGRATION TEST
quarkus.test.integration-test-profile=test
# TEST
%test.quarkus.http.test-port=0
%test.tkit.log.json.enabled=false
%test.quarkus.mockserver.devservices.config-class-path=true
%test.quarkus.mockserver.devservices.config-file=/mockserver.properties
%test.quarkus.mockserver.devservices.config-dir=/mockserver
%test.quarkus.mockserver.devservices.log=false
%test.quarkus.mockserver.devservices.reuse=true

%test.quarkus.keycloak.devservices.roles.alice=role-admin
%test.quarkus.keycloak.devservices.roles.bob=role-user
%test.quarkus.oidc-client.auth-server-url=${quarkus.oidc.auth-server-url}
%test.quarkus.oidc-client.client-id=${quarkus.oidc.client-id}
%test.quarkus.oidc-client.credentials.secret=${quarkus.oidc.credentials.secret}
# PIPE CONFIG

## CLUSTER (Hazelcast via vertx-hazelcast)
# Enabled via env var QUARKUS_VERTX_CLUSTER_CLUSTERED=true in docker-compose / k8s
%prod.quarkus.vertx.cluster.clustered=true

# SOCKJS EVENTBUS BRIDGE
# Permitted so browsers can connect without Bearer token on WS upgrade.
# Security is enforced by BridgeOptions (outbound-only, address regex restricted).
quarkus.http.auth.permission.eventbus.paths=/eventbus/*
quarkus.http.auth.permission.eventbus.policy=permit
#
## Keep long-lived WebSocket / SockJS connections alive.
## idle-timeout=0 disables the HTTP connection idle timeout server-wide
#quarkus.http.idle-timeout=0
## Vert.x underlying TCP options ? disable idle timeout on the HTTP server transport
#quarkus.vertx.eventbus.idle-timeout=0

# suppress verbose Hazelcast output in prod
%prod.quarkus.log.category."com.hazelcast".level=WARNING
