version: "3.9"

# Two-node cluster for local testing of Hazelcast cross-pod delivery.
#
# Build the image first:
#   mvn package -DskipTests
#   docker build -f src/main/docker/Dockerfile.jvm -t onecx-notification-bff:local .
#
# Then start:
#   docker compose up
#
# Test cross-pod delivery:
#   1. POST http://localhost:8080/notifications/dispatch   (hits app1)
#   2. Connect SockJS client to http://localhost:8081/eventbus  (app2)
#   3. Register on "notifications.new.<receiverId>" → assert message arrives

services:
  app1:
    image: onecx-notification-bff:local
    container_name: notification-bff-1
    ports:
      - "8080:8080"   # HTTP / REST / SockJS bridge
      - "5701:5701"   # Hazelcast member port
    volumes:
      - ./src/main/resources/hazelcast-compose.xml:/deployments/hazelcast-compose.xml:ro
    environment:
      QUARKUS_PROFILE: prod
      # Enable Vert.x clustering
      QUARKUS_VERTX_CLUSTER_CLUSTERED: "true"
      QUARKUS_VERTX_CLUSTER_HOST: "0.0.0.0"
      QUARKUS_VERTX_CLUSTER_PUBLIC_HOST: "app1"
      QUARKUS_VERTX_CLUSTER_PORT: "5701"
      QUARKUS_VERTX_CLUSTER_PUBLIC_PORT: "5701"
      # Point Hazelcast at the compose-specific config (TCP-IP discovery)
      JAVA_TOOL_OPTIONS: "-Dhazelcast.config=/deployments/hazelcast-compose.xml"
    networks:
      - cluster-net

  app2:
    image: onecx-notification-bff:local
    container_name: notification-bff-2
    ports:
      - "8081:8080"   # HTTP / REST / SockJS bridge
      - "5702:5701"   # Hazelcast member port (mapped to different host port)
    volumes:
      - ./src/main/resources/hazelcast-compose.xml:/deployments/hazelcast-compose.xml:ro
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_VERTX_CLUSTER_CLUSTERED: "true"
      QUARKUS_VERTX_CLUSTER_HOST: "0.0.0.0"
      QUARKUS_VERTX_CLUSTER_PUBLIC_HOST: "app2"
      QUARKUS_VERTX_CLUSTER_PORT: "5701"
      QUARKUS_VERTX_CLUSTER_PUBLIC_PORT: "5701"
      JAVA_TOOL_OPTIONS: "-Dhazelcast.config=/deployments/hazelcast-compose.xml"
    depends_on:
      - app1
    networks:
      - cluster-net

networks:
  cluster-net:
    driver: bridge
